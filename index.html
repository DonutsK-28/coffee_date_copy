<html lang="en">

  <style>
    body {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      -moz-osx-font-smoothing: grayscale;

}

}
