  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stereotype Coffee Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href='https://fonts.googleapis.com/css?family=VT323' rel='stylesheet'>
  <style>
    body {
      font-family: 'VT323', monospace;
      font-size: 1.5rem; 
      background-image: url("../images/coffee_date_layout.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
    }
    .display-4 {
      font-size: 4.5rem;
    }
    .lead {
      font-size: 1.8rem;
    }
    .btn {
      font-size: 1.4rem;
    }
    .btn-image {
  text-decoration: none;
  display: inline-block;
  margin: 10px; 
  transition: transform 0.2s;
  display: inline-block;
  }
    .btn-image img {
  display: block; 
  width: 120%;           
    max-width: 5000px;    
}
.btn-image:hover {
  transform: scale(1.05);
}
</style>
</head>
<body class="text-white vh-100 d-flex align-items-center">
  <audio id="entrance-bell" preload="auto">
    <source src="../images/Shop Door Bell.mp3" type="audio/mpeg">
  </audio>
  <div class="container">
    <div class="row justify-content-center w-100 m-0">
      <div class="col-md-8 col-lg-6 text-center">
        <h1 class="display-4 fw-bold">Welcome to Stereotype Coffee Shop!</h1>
        <p class="lead mt-3">
          Come on in! Get comfy, order up, and hey... you might meet someone! So, what's your preference?
        </p>
        <div class="mt-4">
          <a href="men/m_c.html" class="btn btn-outline-light btn-lg px-4 m-2">Men</a>
          <a href="women/w_c.html" class="btn btn-outline-light btn-lg px-4 m-2">Women</a>
          <a href="no_preference/np_c.html" class="btn btn-outline-light btn-lg px-4 m-2">No Preference</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const audio = document.getElementById('entrance-bell');
      audio.play().catch(error => {
        console.log("Autoplay blocked. Sound will play on mouse move.");
        document.addEventListener('mouseover', () => {
          audio.play();
        }, { once: true });
      });
    });
  </script>
</body>
</html>
