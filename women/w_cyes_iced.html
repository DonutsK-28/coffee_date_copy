<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href='https://fonts.googleapis.com/css?family=VT323' rel='stylesheet'>
  <style>
    body {
      font-family: 'VT323', monospace;
      background-image: url(/images/coffee_date_station.jpg);
      background-size: cover;
    }
  </style>
</head>
<body class="bg-img text-white vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <p class="display-6">Would you like it with milk or no milk?</p>
        <audio id="background-music" preload="auto">
          <source src="/images/chance-of-rain-albert-behar-main-version-36831-02-47.mp3" type="audio/mpeg">
        </audio>  
        <div class="mt-4">
  <a href="/date_options/w_manicpixie_carfrappe.html" class="btn-image">
    <img src="../images/options/coffee_date_milk.png" alt="Yes" style="width: 265px;">
  </a>
  
  <a href="/date_options/you_are_single.html" class="btn-image">
    <img src="../images/options/coffee_date_nomilk.png" alt="No" style="width: 275px;">
  </a>
</div>

      </div>
    </div>
  </div>
<script>
    window.addEventListener('DOMContentLoaded', () => {
      const audio = document.getElementById('background-music');
      audio.play().catch(error => {
        console.log("Autoplay blocked. Sound will play on mouse move.");
        document.addEventListener('mouseover', () => {
          audio.play();
        }, { once: true });
      });
    });
  </script>
</body>
</html>
