<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href='https://fonts.googleapis.com/css?family=VT323' rel='stylesheet'>
  <style>
    body {
      font-family: 'VT323', monospace;
      background-image: url(../images/coffee_date_layout.jpg);
      background-size: cover;
    }
    .custom-text-box {
      background-image: url(/images/text_box.png);
      background-size: contain;   
      background-repeat: no-repeat;
      background-position: center;
      padding: 60px;               
      display: inline-block;      
}
  </style>
</head>
<body class="bg-img text-white vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <img src="../images/drinks/coffee_date_icedAmericano.png" class="img-fluid w-25">
        <img src="/images/finance_bro.png" class="img-fluid w-40" alt="Stereotypical finance bro, zip-up vest, blue button down, gelled back hair.">
        <img src="../images/drinks/coffee_date_hotAmericano.png" class="img-fluid w-25">
          <div class="custom-text-box">
            <p class="display-6 mb-0">You look like no one has explained the stock market to you... I can fix that.</p>
          </div>
        <div class="mt-4">
          <a href="../index.html" class="btn btn-outline-light px-4">Play again?</a>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
