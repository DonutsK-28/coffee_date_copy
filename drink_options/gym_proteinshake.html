<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href='https://fonts.googleapis.com/css?family=VT323' rel='stylesheet'>
  <style>
    body {
      font-family: 'VT323', monospace;
      background-image: url(../images/environment/coffee_date_layout.jpg);
      
      background-size: cover;
    }
    .custom-text-box {
      background-image: url(/images/text_box.png);
      background-size: contain;   
      background-repeat: no-repeat;
      background-position: center;
      padding: 20%;  
      margin-top: 50%;             
      display: inline-block;      
}
.people-scale{
  margin-right: 50%;
}
.text-box{
  margin-left: 50%;
  margin-top: -30%;
  width: 70%;
}
.date-text{
  font-size: 200%;
  color:antiquewhite;
}
.img-thumbnail{
  color: antiquewhite;
}
  </style>
</head>
<body>
  <audio id="background-music" preload="auto">
          <source src="../images/freesound_community-kettle-pour-into-cup-001-93575.mp3" type="audio/mpeg">
        </audio>
     <div class="container">
    <div class="row">
      <div class="col-md-8">
        <img src="../images/drinks/coffee_date_proteinShake.png" class="img-thumbnail mt-4">
      </div>
      <div class="col d-flex align-items-center">
        <div class="date-text display-4 fw-bold lead mt-3 align-items-center border-3">
          <p>You got Protein Shake! You prioritize health and are a fan of diet culture.</p>
          <a href="../date_options/m_gym_proteinshake.html" 
          class="btn btn-outline-light px-4 ">♡・〰 Your Stereotype Date Awaits 〰・♡</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const audio = document.getElementById('background-music');
      audio.play().catch(error => {
        console.log("Autoplay blocked. Sound will play on mouse move.");
        document.addEventListener('mouseover', () => {
          audio.play();
        }, { once: true });
      });
    });
  </script>
</body>
</html>
